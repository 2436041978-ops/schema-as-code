# =============================================================================
# 04-business-integration/demo/alert-card-binding.yaml
# =============================================================================
# 端到端示例：告警卡片语义治理全链路 —— 产品绑定配置
# 
# 作用：将业务组件（告警卡片）与意图协议（intent-schema-compiler）
#       进行声明式绑定，供 Compiler 生成产物、Runtime 执行拦截。
# =============================================================================

product:
  id: "product-a"
  name: "统一监控告警平台"
  domain: "observability"

registry:
  source: "github.com/2436041978-ops/intent-schema-compiler"
  version: "v0.1.0"
  schema_path: "schema/v0.1.0"

# ------------------------------------------------------------------------------
# 组件级意图绑定（Component-Level Intent Binding）
# ------------------------------------------------------------------------------
components:
  - component_id: "alert-card"
    component_name: "AlertCard"
    file_path: "src/components/AlertCard/index.tsx"

    # 绑定的意图契约
    intent_contract:
      id: "AW-001"
      name: "alert-card"
      semantic_domain: "observational"

    # 语义令牌映射：组件 Props → 语义令牌
    semantic_token_bindings:
      - prop: "level"
        token: "status.critical"
        allowed_values: ["P0", "P1", "P2", "P3"]
        default: "P1"

      - prop: "motion"
        token: "pulse.red.urgent"
        condition: "level == 'P0'"

      - prop: "sound"
        token: "alert.high"
        condition: "level == 'P0'"

    # 运行时守卫策略
    runtime_guard:
      enabled: true
      guard_type: "withIntentGuard"

      # 人机边界校验
      human_ai_boundary:
        human_mandatory_fields:
          - "acknowledged_by"
        ai_prohibited_actions:
          - "auto_resolve"
          - "mute_alert"

      # 降级策略
      fallback:
        on_violation: "render_blocked_state"
        blocked_ui:
          title: "语义校验失败"
          description: "当前告警卡片存在语义漂移，已阻断渲染"
          escalation_button: "人工确认并放行"

  - component_id: "destructive-action-btn"
    component_name: "ResolveButton"
    file_path: "src/components/AlertCard/ResolveButton.tsx"

    intent_contract:
      id: "IC-003"
      name: "destructive-action"
      semantic_domain: "transactional"

    semantic_token_bindings:
      - prop: "actionType"
        token: "action.destructive"
        allowed_values: ["resolve", "escalate"]

    runtime_guard:
      enabled: true
      guard_type: "withIntentGuard"

      human_ai_boundary:
        human_mandatory_fields:
          - "human_confirmed"
          - "confirm_reason"
        ai_prohibited_actions:
          - "direct_resolve"
          - "batch_resolve"

      fallback:
        on_violation: "modal_confirm"
        modal_config:
          title: "高危操作确认"
          content: "该操作涉及 {{actionType}}，必须由人工二次确认"
          confirm_text: "我已确认风险"
          cancel_text: "取消"

# ------------------------------------------------------------------------------
# API 级意图绑定（API-Level Intent Binding）
# ------------------------------------------------------------------------------
api_endpoints:
  - path: "/api/v1/alerts"
    method: "POST"
    intent_contract: "AW-001"

    request_guard:
      required_headers:
        - "x-actor-type"
      body_schema_ref: "schema/v0.1.0/governance/response-schema.yaml"

    response_guard:
      validate_semantic_tokens: true
      synonym_blacklist_check: true

  - path: "/api/v1/alerts/:id/resolve"
    method: "POST"
    intent_contract: "IC-003"

    request_guard:
      required_fields:
        - "human_confirmed"
        - "acknowledged_by"
      ai_blocked: true

# ------------------------------------------------------------------------------
# LLM 输出管道绑定（LLM Output Pipeline Binding）
# ------------------------------------------------------------------------------
llm_pipeline:
  model: "gpt-4"

  # Prompt 约束注入
  prompt_injection:
    enabled: true
    system_prefix_ref: "schema/v0.1.0/governance/prompt-constraints.yaml"

    # 强制语义令牌锁定
    token_lock:
      - token: "status.critical"
        prohibited_synonyms: ["严重", "紧急", "危急"]
      - token: "status.warning"
        prohibited_synonyms: ["注意", "提示"]

  # 输出校验配置
  output_validation:
    enabled: true
    validator_ref: "schema/v0.1.0/execution/scenario-tests.yaml"

    four_tier_check:
      syntax: true
      semantic: true
      safety: true
      aesthetic: true

    on_block:
      action: "escalate_to_human"
      log_drift_event: true
      notify_channel: "feishu-webhook"

# ------------------------------------------------------------------------------
# 观测与反馈配置（Observability Bridge Binding）
# ------------------------------------------------------------------------------
observability:
  bridge_enabled: true

  # 漂移事件上报
  drift_events:
    - event_name: "semantic_drift_detected"
      attributes:
        - "component_id"
        - "intent_contract_id"
        - "drift_type"
        - "original_token"
        - "llm_output"

    - event_name: "human_boundary_triggered"
      attributes:
        - "action_type"
        - "actor_type"
        - "violation_rule"

  # 自动反哺 PR 配置
  feedback_loop:
    enabled: true
    auto_pr:
      trigger: "drift_count > 3 in 24h"
      target_repo: "github.com/2436041978-ops/intent-schema-compiler"
      target_file: "schema/v0.1.0/semantic/synonym-mapping.yaml"
      pr_title_template: "[Auto] 收紧 {{product_id}} 同义词规则"
